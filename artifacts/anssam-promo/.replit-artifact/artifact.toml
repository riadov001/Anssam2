kind = "video"
previewPath = "/anssam-promo/"
title = "Anssam — Vidéos Promotionnelles"
version = "1.0.0"
id = "artifacts/anssam-promo"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/anssam-promo/" ]
localPort = 24633

[services.development]
run = "pnpm --filter @workspace/anssam-promo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/anssam-promo", "run", "build" ]
publicDir = "artifacts/anssam-promo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24633"
BASE_PATH = "/anssam-promo/"
