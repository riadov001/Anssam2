kind = "mobile"
previewPath = "/"
title = "Noor — Islamic App"
version = "1.0.0"
id = "artifacts/noor"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/" ]
localPort = 8099

[services.development]
run = "pnpm --filter @workspace/noor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/noor", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/noor", "run", "serve" ]

[services.env]
PORT = "8099"
BASE_PATH = "/"
